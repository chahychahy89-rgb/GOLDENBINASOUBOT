<script>
    let gold = parseInt(localStorage.getItem('g_bal')) || 0;
    let energy = parseInt(localStorage.getItem('g_nrg')) || 1000;
    let nextBox = localStorage.getItem('g_box') || 0;
    // استبدل 4820 بمعرفك الحقيقي من Adsgram للربح
    const ads = window.Adsgram ? window.Adsgram.init({ blockId: "4820" }) : null;

    function update() {
        document.getElementById('score').innerText = gold.toLocaleString();
        document.getElementById('energyFill').style.width = (energy/10) + '%';
        document.getElementById('energyText').innerText = ⚡ ${energy} / 1000;
        localStorage.setItem('g_bal', gold);
        localStorage.setItem('g_nrg', energy);
        let d = nextBox - Date.now();
        document.getElementById('timer').innerText = d > 0 ? Math.ceil(d/60000)+" دقيقة" : "جاهز";
    }

    document.getElementById('coinBtn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(energy >= 1) { gold += 1; energy -= 1; update(); }
    });

    setInterval(() => { if(energy < 1000) { energy += 2; update(); } }, 2000);

    function watchAd() {
        if(ads) { ads.show().then(() => { gold += 100; update(); }); }
        else { gold += 100; update(); }
    }

    function openBox() {
        if(Date.now() < nextBox) return alert("انتظر شحن الصندوق!");
        watchAd(); // الصندوق يفتح بمشاهدة إعلان لزيادة أرباحك
        nextBox = Date.now() + 900000; // 15 دقيقة
        localStorage.setItem('g_box', nextBox);
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        if(p === 'leader') renderLeader();
    }
